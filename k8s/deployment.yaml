apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        image: 160686961672.dkr.ecr.ap-south-1.amazonaws.com/flask-app:latest
        imagePullPolicy: Always

        env:
        - name: DB_HOST
          value: "three-tier-app-mysql.cxes68wssrwe.ap-south-1.rds.amazonaws.com"

        - name: DB_USER
          value: "db_username"

        # Replace with your actual password
        - name: DB_PASSWORD
          value: "db_password"

        - name: DB_NAME
          value: "three_tier_app_db"

        ports:
        - containerPort: 5000
